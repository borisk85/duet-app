<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Duet — Feature Graphic 1024x500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #2a2a2a;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
  }
  #frame {
    width: 1024px;
    height: 500px;
    background: #0D0D0D;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    overflow: hidden;
  }
  #icon {
    width: 160px;
    height: 160px;
    border-radius: 36px;
    border: 2px solid #C9A84C;
    box-shadow: 0 0 32px rgba(201, 168, 76, 0.3);
    object-fit: cover;
    display: block;
  }
  #text {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 72px;
    line-height: 1;
    color: #C9A84C;
  }
  #tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.2;
    color: #FFFFFF;
    opacity: 0.75;
  }
  #download {
    background: #C9A84C;
    color: #0D0D0D;
    border: none;
    padding: 14px 28px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  #download:hover { background: #D4B563; }
</style>
</head>
<body>
  <div id="frame">
    <img id="icon" src="ios/Runner/Assets.xcassets/AppIcon.appiconset/1024.png" alt="">
    <div id="text">
      <div id="title">Дуэт</div>
      <div id="tagline">AI-эксперт по напиткам к еде</div>
    </div>
  </div>
  <button id="download">Download PNG (1024×500)</button>

<script>
  document.getElementById('download').addEventListener('click', async () => {
    const frame = document.getElementById('frame');
    const canvas = await html2canvas(frame, {
      width: 1024,
      height: 500,
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0D0D0D'
    });
    const link = document.createElement('a');
    link.download = 'feature_graphic.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
